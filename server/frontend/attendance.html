<!DOCTYPE html>
<html>


<head>

<title>Attendance</title>

<link rel="stylesheet" href="style.css">

</head>



<body>



<div class="main">


<h1>Mark Attendance</h1>



<table>


<thead>


<tr>

<th>Student ID</th>
<th>Name</th>
<th>Department</th>
<th>Status</th>

</tr>


</thead>


<tbody id="attendanceTable">


</tbody>


</table>



</div>




<script>



let students=[];



fetch("http://localhost:5000/students")


.then(res=>res.json())


.then(data=>{


students=data;


displayStudents();


});







function displayStudents(){



let table=document.getElementById("attendanceTable");



students.forEach(student=>{


table.innerHTML += `



<tr>


<td>${student.student_id}</td>


<td>${student.full_name}</td>


<td>${student.department}</td>


<td>



<button onclick="markAttendance('${student.student_id}','Present')">

Present

</button>



<button onclick="markAttendance('${student.student_id}','Absent')">

Absent

</button>



</td>


</tr>



`;



});



}








function markAttendance(id,status){



let today = new Date()
.toISOString()
.split("T")[0];



fetch("http://localhost:5000/attendance",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


student_id:id,


date:today,


status:status


})


})


.then(res=>res.json())


.then(data=>{


alert(data.message);


});


}



</script>




</body>


</html>
