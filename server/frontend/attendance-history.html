<!DOCTYPE html>
<html>

<head>

<title>Attendance History</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main">

<h1>Attendance History</h1>

<table>

<thead>

<tr>

<th>Date</th>
<th>Student ID</th>
<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</div>

<script>

fetch("http://localhost:5000/attendance")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("attendanceTable");

data.forEach(record=>{

table.innerHTML += `

<tr>

<td>${record.date}</td>

<td>${record.student_id}</td>

<td>${record.status}</td>

</tr>

`;

});

});

</script>

</body>

</html>
