<!DOCTYPE html>
<html>

<head>

    <title>Attendance History</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>College App</h2>

        <ul>

            <li onclick="location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li onclick="location.href='add-student.html'">
                <i class="fa-solid fa-user-plus"></i>
                Add Student
            </li>

            <li onclick="location.href='view-students.html'">
                <i class="fa-solid fa-users"></i>
                View Students
            </li>

            <li onclick="location.href='attendance.html'">
                <i class="fa-solid fa-clipboard-check"></i>
                Attendance
            </li>

            <li onclick="location.href='attendance-history.html'">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Attendance History
            </li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <h1>Attendance History</h1>

        <table>

            <thead>

                <tr>

                    <th>Date</th>
                    <th>Student ID</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="attendanceTable">

            </tbody>

        </table>

    </div>

</div>

<script>

fetch("http://localhost:5000/attendance")

.then(res => res.json())

.then(data => {

    let table = document.getElementById("attendanceTable");

    table.innerHTML = "";

    data.forEach(record => {

        table.innerHTML += `

        <tr>

            <td>${record.date}</td>

            <td>${record.student_id}</td>

            <td>${record.status}</td>

        </tr>

        `;

    });

});

</script>

</body>

</html>
