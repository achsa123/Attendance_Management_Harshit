<!DOCTYPE html>
<html>

<head>

    <title>Export Attendance</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>College App</h2>

        <ul>

            <li onclick="location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li onclick="location.href='add-student.html'">
                <i class="fa-solid fa-user-plus"></i>
                Add Student
            </li>

            <li onclick="location.href='view-students.html'">
                <i class="fa-solid fa-users"></i>
                View Students
            </li>

            <li onclick="location.href='attendance.html'">
                <i class="fa-solid fa-clipboard-check"></i>
                Attendance
            </li>

            <li onclick="location.href='attendance-history.html'">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Attendance History
            </li>

            <li onclick="location.href='export.html'">
                <i class="fa-solid fa-file-csv"></i>
                Export CSV
            </li>

        </ul>

    </div>

    <div class="main">

        <h1>Export Attendance</h1>

        <p>Download all attendance records as a CSV file.</p>

        <button onclick="exportCSV()">

            <i class="fa-solid fa-download"></i>

            Export Attendance CSV

        </button>

    </div>

</div>

<script>

function exportCSV(){

    fetch("http://localhost:5000/attendance")

    .then(res => res.json())

    .then(data => {

        let csv = "Date,Student ID,Status\n";

        data.forEach(row => {

            csv += `${row.date},${row.student_id},${row.status}\n`;

        });

        let blob = new Blob([csv], { type: "text/csv" });

        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");

        a.href = url;

        a.download = "attendance.csv";

        a.click();

    });

}

</script>

</body>

</html>
