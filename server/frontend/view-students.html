<!DOCTYPE html>
<html>

<head>

<title>View Students</title>
<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="main">


<h1>Students List</h1>


<div class="filters">


<input 
type="text" 
id="search"
placeholder="Search by ID or Name"
>


<select id="department">

<option value="">All Departments</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>

</select>



<select id="semester">

<option value="">All Semester</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>

</select>


</div>



<table>


<thead>

<tr>

<th>Student ID</th>
<th>Name</th>
<th>Department</th>
<th>Semester</th>
<th>Email</th>
<th>Phone</th>
<th>Actions</th>

</tr>


</thead>



<tbody id="studentTable">


</tbody>


</table>


</div>



<script>


let students = [];


fetch("http://localhost:5000/students")


.then(res=>res.json())


.then(data=>{


students = data;

displayStudents(students);


});




function displayStudents(data){


let table=document.getElementById("studentTable");


table.innerHTML="";



data.forEach(student=>{


table.innerHTML += `


<tr>


<td>${student.student_id}</td>

<td>${student.full_name}</td>

<td>${student.department}</td>

<td>${student.semester}</td>

<td>${student.email}</td>

<td>${student.phone}</td>


<td>

<button>Edit</button>

<button>Delete</button>


</td>


</tr>


`;


});


}




document.getElementById("search").addEventListener("keyup",filter);



document.getElementById("department").addEventListener("change",filter);



document.getElementById("semester").addEventListener("change",filter);




function filter(){


let search =
document.getElementById("search").value.toLowerCase();


let dept =
document.getElementById("department").value;


let sem =
document.getElementById("semester").value;




let result = students.filter(student=>{


return (

(student.student_id.toString().includes(search) ||
student.full_name.toLowerCase().includes(search))

&&

(dept=="" || student.department==dept)

&&

(sem=="" || student.semester==sem)


);


});



displayStudents(result);


}


</script>



</body>

</html>
