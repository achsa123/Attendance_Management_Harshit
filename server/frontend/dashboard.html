<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="main">


<h1>Student Attendance Dashboard</h1>


<div class="cards">


<div class="card">

<h2>Total Students</h2>

<p id="totalStudents">0</p>

</div>



<div class="card">

<h2>Present Today</h2>

<p id="presentToday">0</p>

</div>



<div class="card">

<h2>Absent Today</h2>

<p id="absentToday">0</p>

</div>



<div class="card">

<h2>Total Attendance</h2>

<p id="totalAttendance">0</p>

</div>


</div>


</div>



<script>


let today = new Date()
.toISOString()
.split("T")[0];



// Students count

fetch("http://localhost:5000/students")

.then(res=>res.json())

.then(data=>{


document.getElementById("totalStudents").innerHTML = data.length;


});




// Attendance stats

fetch("http://localhost:5000/attendance")

.then(res=>res.json())

.then(data=>{


document.getElementById("totalAttendance").innerHTML=data.length;


let present=0;

let absent=0;



data.forEach(record=>{


if(record.date === today){


if(record.status==="Present")

present++;


if(record.status==="Absent")

absent++;


}


});



document.getElementById("presentToday").innerHTML=present;


document.getElementById("absentToday").innerHTML=absent;



});


</script>



</body>

</html>
