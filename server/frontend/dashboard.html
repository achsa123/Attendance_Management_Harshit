<!DOCTYPE html>
<html>

<head>

    <title>Student Attendance Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>College App</h2>

        <ul>

            <li onclick="location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li onclick="location.href='add-student.html'">
                <i class="fa-solid fa-user-plus"></i>
                Add Student
            </li>

            <li onclick="location.href='view-students.html'">
                <i class="fa-solid fa-users"></i>
                View Students
            </li>

            <li onclick="location.href='attendance.html'">
                <i class="fa-solid fa-clipboard-check"></i>
                Attendance
            </li>

            <li onclick="location.href='attendance-history.html'">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Attendance History
            </li>

        </ul>

    </div>


    <!-- Main Content -->

    <div class="main">

        <h1>Student Attendance Dashboard</h1>

        <div class="cards">

            <div class="card">

                <i class="fa-solid fa-users fa-2x"></i>

                <h2>Total Students</h2>

                <p id="studentCount">0</p>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-check fa-2x"></i>

                <h2>Present Today</h2>

                <p id="presentCount">0</p>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-xmark fa-2x"></i>

                <h2>Absent Today</h2>

                <p id="absentCount">0</p>

            </div>

            <div class="card">

                <i class="fa-solid fa-calendar-days fa-2x"></i>

                <h2>Total Attendance</h2>

                <p id="attendanceCount">0</p>

            </div>

        </div>

        <br><br>

        <h2>Quick Actions</h2>

        <div class="cards">

            <div class="card" onclick="location.href='add-student.html'">

                <i class="fa-solid fa-user-plus fa-2x"></i>

                <h3>Add Student</h3>

            </div>

            <div class="card" onclick="location.href='view-students.html'">

                <i class="fa-solid fa-users fa-2x"></i>

                <h3>View Students</h3>

            </div>

            <div class="card" onclick="location.href='attendance.html'">

                <i class="fa-solid fa-clipboard-check fa-2x"></i>

                <h3>Take Attendance</h3>

            </div>

            <div class="card" onclick="location.href='attendance-history.html'">

                <i class="fa-solid fa-clock-rotate-left fa-2x"></i>

                <h3>Attendance History</h3>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
