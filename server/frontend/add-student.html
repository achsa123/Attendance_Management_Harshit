<!DOCTYPE html>
<html>

<head>

<title>Add Student</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="layout">


<div class="sidebar">

<h2>College App</h2>


<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i> Dashboard
</li>


<li onclick="location.href='add-student.html'">
<i class="fa-solid fa-user-plus"></i> Add Student
</li>


<li onclick="location.href='view-students.html'">
<i class="fa-solid fa-users"></i> View Students
</li>


<li onclick="location.href='attendance.html'">
<i class="fa-solid fa-clipboard-check"></i> Attendance
</li>


<li onclick="location.href='attendance-history.html'">
<i class="fa-solid fa-clock-rotate-left"></i> Attendance History
</li>


</ul>


</div>



<div class="main">


<h1>Add Student</h1>



<div class="card">


<form id="studentForm">


<input type="text" id="student_id" placeholder="Student ID" required>


<input type="text" id="full_name" placeholder="Full Name" required>


<input type="email" id="email" placeholder="Email">


<input type="text" id="phone" placeholder="Phone">


<input type="text" id="department" placeholder="Department">


<input type="number" id="semester" placeholder="Semester">


<input type="date" id="dob">


<select id="gender">

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>


<br><br>


<button type="submit">

<i class="fa-solid fa-floppy-disk"></i>

Save Student

</button>


</form>


</div>


</div>


</div>



<script>

document.getElementById("studentForm")
.addEventListener("submit", function(e){


e.preventDefault();



let student = {


student_id:
document.getElementById("student_id").value,


full_name:
document.getElementById("full_name").value,


email:
document.getElementById("email").value,


phone:
document.getElementById("phone").value,


department:
document.getElementById("department").value,


semester:
document.getElementById("semester").value,


dob:
document.getElementById("dob").value,


gender:
document.getElementById("gender").value


};




fetch("http://localhost:5000/students",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify(student)



})


.then(response=>response.json())


.then(data=>{


alert("Student Added Successfully");


console.log(data);


document.getElementById("studentForm").reset();



})


.catch(error=>{


console.log(error);


alert("Student Not Added");


});



});

</script>



</body>

</html>
