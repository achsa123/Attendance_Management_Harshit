<!DOCTYPE html>
<html>

<head>

    <title>Add Student</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>College App</h2>

        <ul>

            <li onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i> Dashboard</li>

            <li onclick="location.href='add-student.html'"><i class="fa-solid fa-user-plus"></i> Add Student</li>

            <li onclick="location.href='view-students.html'"><i class="fa-solid fa-users"></i> View Students</li>

            <li onclick="location.href='attendance.html'"><i class="fa-solid fa-clipboard-check"></i> Attendance</li>

            <li onclick="location.href='attendance-history.html'"><i class="fa-solid fa-clock-rotate-left"></i> Attendance History</li>

        </ul>

    </div>

    <div class="main">

        <h1>Add Student</h1>

        <div class="card">

            <form id="studentForm">

                <input type="text" id="student_id" placeholder="Student ID" required>

                <input type="text" id="full_name" placeholder="Full Name" required>

                <input type="email" id="email" placeholder="Email">

                <input type="text" id="phone" placeholder="Phone">

                <input type="text" id="department" placeholder="Department">

                <input type="number" id="semester" placeholder="Semester">

                <input type="date" id="dob">

                <select id="gender">

                    <option>Male</option>

                    <option>Female</option>

                    <option>Other</option>

                </select>

                <br><br>

                <button type="submit">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Student

                </button>

            </form>

        </div>

    </div>

</div>

<script src="addstudent.js"></script>

</body>

</html>
